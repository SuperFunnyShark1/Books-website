		<style>
			.reading-stack {
				display: flex;
				flex-direction: column;
				gap: 2.25em;
				max-width: 40em;
				margin: 0 auto;
			}
			.reading-card {
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.12);
				border-radius: 8px;
				padding: 2em 2em 1.75em;
				box-shadow: 0 10px 36px rgba(0, 0, 0, 0.28);
				transition: border-color 0.2s ease, box-shadow 0.2s ease;
			}
			.reading-card:hover {
				border-color: rgba(255, 255, 255, 0.18);
				box-shadow: 0 14px 44px rgba(0, 0, 0, 0.35);
			}
			.reading-card h3.reading-card-title {
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 1.35em;
				font-weight: 700;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.95);
				margin: 0 0 1.25em 0;
				padding-bottom: 0.75em;
				border-bottom: 2px solid rgba(200, 175, 130, 0.45);
			}
			.reading-card .cover-wrap {
				margin: 0 auto 1.5em;
				max-width: 220px;
				border-radius: 6px;
				overflow: hidden;
				box-shadow:
					0 4px 24px rgba(0, 0, 0, 0.45),
					0 0 0 1px rgba(255, 255, 255, 0.08);
			}
			.reading-card .cover-wrap img {
				display: block;
				width: 100%;
				height: auto;
				vertical-align: middle;
			}
			.reading-card .book-title {
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 1.65em;
				font-weight: 600;
				color: #fff;
				margin: 0 0 0.35em 0;
				line-height: 1.2;
				text-align: center;
			}
			.reading-card .book-author {
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 1em;
				font-weight: 400;
				font-style: italic;
				color: rgba(232, 213, 183, 0.9);
				margin: 0 0 1.25em 0;
				text-align: center;
			}
			.reading-card .book-desc {
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 0.95em;
				font-weight: 300;
				line-height: 1.75;
				color: rgba(255, 255, 255, 0.75);
				margin: 0 0 1.5em 0;
				text-align: center;
			}
			.reading-card .chapters {
				font-family: "Rubik", Helvetica, sans-serif;
				text-align: center;
				padding-top: 1.25em;
				border-top: 1px solid rgba(255, 255, 255, 0.1);
			}
			.reading-card .chapters-label {
				display: block;
				font-size: 0.8em;
				font-weight: 600;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.5);
				margin-bottom: 0.5em;
			}
			.reading-card .chapters-nums {
				font-size: 1.25em;
				font-weight: 600;
				color: rgba(255, 255, 255, 0.92);
				letter-spacing: 0.15em;
			}
			.reading-card.reading-card--list h3.reading-card-title {
				margin-bottom: 1em;
			}
			.reading-card ol.reading-done {
				margin: 0;
				padding: 0 0 0 1.5em;
				list-style: decimal;
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 1.05em;
				line-height: 1.8;
				color: rgba(255, 255, 255, 0.85);
			}
			.reading-card ol.reading-done li {
				padding-left: 0.4em;
			}
			.reading-card ol.reading-done li::marker {
				color: rgba(200, 175, 130, 0.9);
				font-weight: 600;
			}
			.reading-card ul.reading-suggestions {
				margin: 0;
				padding: 0 0 0 1.35em;
				list-style: disc;
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 1.05em;
				line-height: 1.85;
				color: rgba(255, 255, 255, 0.85);
			}
			.reading-card ul.reading-suggestions li {
				padding-left: 0.35em;
			}
			.reading-card ul.reading-suggestions li::marker {
				color: rgba(200, 175, 130, 0.85);
			}
			.reading-card .announcement-text {
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 1.1em;
				font-weight: 500;
				color: rgba(255, 255, 255, 0.88);
				line-height: 1.5;
				margin: 0;
			}
			@media screen and (max-width: 736px) {
				.reading-card {
					padding: 1.5em 1.25em 1.35em;
				}
				.reading-card .book-title {
					font-size: 1.4em;
				}
			}
		</style>

							<section class="reading-card reading-card--list" aria-labelledby="read-heading">
