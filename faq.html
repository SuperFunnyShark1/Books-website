<!DOCTYPE html>
<!-- Contenido: data/site-global.json + data/faq.json -->
<html>
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
		<title></title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			.faq-hero {
				margin: 0 0 2.5em 0;
				border-radius: 6px;
				overflow: hidden;
				box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
				border: 1px solid rgba(255, 255, 255, 0.08);
			}
			.faq-hero img {
				display: block;
				width: 100%;
				height: min(42vh, 320px);
				object-fit: cover;
				object-position: center;
			}
			ol.faq-accordion {
				list-style: none;
				padding: 0;
				margin: 0;
				counter-reset: faq;
			}
			ol.faq-accordion > li {
				counter-increment: faq;
				margin-bottom: 1em;
			}
			ol.faq-accordion details {
				background: rgba(255, 255, 255, 0.04);
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 6px;
				overflow: hidden;
				transition: border-color 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
			}
			ol.faq-accordion details:hover {
				border-color: rgba(255, 255, 255, 0.2);
				background: rgba(255, 255, 255, 0.06);
			}
			ol.faq-accordion details[open] {
				border-color: rgba(120, 180, 255, 0.45);
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
			}
			ol.faq-accordion summary {
				display: flex;
				align-items: center;
				gap: 1.1em;
				padding: 1.1em 1.25em;
				cursor: pointer;
				list-style: none;
				font-family: "Rubik", Helvetica, sans-serif;
				font-weight: 600;
				font-size: 1.05em;
				line-height: 1.35;
				color: rgba(255, 255, 255, 0.95);
				user-select: none;
			}
			ol.faq-accordion summary::-webkit-details-marker {
				display: none;
			}
			ol.faq-accordion summary::before {
				content: counter(faq, decimal-leading-zero);
				flex: 0 0 auto;
				min-width: 2.5em;
				height: 2.5em;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 0.85em;
				font-weight: 700;
				letter-spacing: 0.02em;
				color: #1a1a2e;
				background: linear-gradient(145deg, #e8d5b7 0%, #c4a574 50%, #9a7b4f 100%);
				border-radius: 8px;
				box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
			}
			ol.faq-accordion summary::after {
				content: "";
				margin-left: auto;
				width: 0.5em;
				height: 0.5em;
				border-right: 2px solid rgba(255, 255, 255, 0.45);
				border-bottom: 2px solid rgba(255, 255, 255, 0.45);
				transform: rotate(45deg);
				transition: transform 0.25s ease;
				flex-shrink: 0;
			}
			ol.faq-accordion details[open] summary::after {
				transform: rotate(-135deg);
				margin-top: 0.25em;
			}
			ol.faq-accordion .faq-answer {
				padding: 0 1.25em 1.25em 4.65em;
				font-family: "Rubik", Helvetica, sans-serif;
				font-size: 0.95em;
				font-weight: 300;
				line-height: 1.75;
				color: rgba(255, 255, 255, 0.72);
				border-top: 1px solid rgba(255, 255, 255, 0.06);
			}
			ol.faq-accordion .faq-answer p {
				margin: 0.75em 0 0 0;
			}
			ol.faq-accordion .faq-answer p:first-child {
				margin-top: 1em;
			}
			@media screen and (max-width: 736px) {
				ol.faq-accordion summary {
					padding: 1em;
					font-size: 1em;
					gap: 0.85em;
				}
				ol.faq-accordion .faq-answer {
					padding: 0 1em 1em 1em;
				}
				ol.faq-accordion summary::before {
					min-width: 2.25em;
					height: 2.25em;
					font-size: 0.8em;
				}
			}
		</style>
	</head>
	<body class="is-preload">
		<div id="page-wrapper">
			<header id="header">
				<h1><a href="#"></a></h1>
				<nav>
					<a href="#menu"></a>
				</nav>
			</header>
			<nav id="menu">
				<div class="inner">
					<h2></h2>
					<ul class="links"></ul>
					<a href="#" class="close"></a>
				</div>
			</nav>
			<section id="wrapper">
				<header>
					<div class="inner">
						<h2></h2>
						<p></p>
					</div>
				</header>
				<div class="wrapper">
					<div class="inner">
						<div class="faq-hero"></div>
						<h3 class="major" id="faq-bloque-titulo"></h3>
						<p id="faq-bloque-parrafo"></p>
						<ol class="faq-accordion"></ol>
					</div>
				</div>
			</section>
			<section id="footer">
				<div class="inner">
					<ul class="copyright"></ul>
				</div>
			</section>
		</div>
		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/content-loader.js"></script>
		<script src="assets/js/main.js"></script>
	</body>
</html>
